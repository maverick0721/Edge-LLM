version: "3.9"

services:
  llama:
    image: ghcr.io/ggerganov/llama.cpp:server
    command: >
      -m /models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
      --port 8080
    volumes:
      - ./models:/models
    ports:
      - "8080:8080"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python -m cli.cli
    environment:
      PYTHONPATH: /app/src
      LLAMA_SERVER_URL: http://llama:8080/completion
    ports:
      - "8000:8000"
    depends_on:
      llama:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import json, urllib.request
          payload = json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3))
          raise SystemExit(0 if payload.get('status') in {'ok', 'degraded'} else 1)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  ui:
    image: node:18
    working_dir: /app
    volumes:
      - ./ui/chat-app:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          fetch('http://127.0.0.1:5173').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
