services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    command: >
      -m ${EDGE_LLM_MODEL_PATH:-/models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf}
      --port 8080
      --host 0.0.0.0
      -c ${EDGE_LLM_CTX_SIZE:-2048}
      -t ${EDGE_LLM_THREADS:-4}
    volumes:
      - ../models:/models
    ports:
      - "${EDGE_LLM_LLAMA_PORT:-8080}:8080"
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      PYTHONPATH: /app/src
      EDGE_LLM_UI_DIST: /app/ui-dist
      EDGE_LLM_PROFILE: ${EDGE_LLM_PROFILE:-lite}
      EDGE_LLM_MODEL_FILE: ${EDGE_LLM_MODEL_FILE:-tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf}
      EDGE_LLM_N_PREDICT: ${EDGE_LLM_N_PREDICT:-160}
      EDGE_LLM_TEMPERATURE: ${EDGE_LLM_TEMPERATURE:-0.7}
      LLAMA_SERVER_URL: http://llama:8080/completion
    ports:
      - "${EDGE_LLM_PORT:-8000}:8000"
    depends_on:
      llama:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import json, urllib.request
          payload = json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3))
          ready = payload.get('status') in {'ok', 'degraded'} and payload.get('ui_served') is True
          raise SystemExit(0 if ready else 1)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
