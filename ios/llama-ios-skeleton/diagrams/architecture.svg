<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380" role="img" aria-label="iOS LLama Architecture">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#222"/>
    </marker>
    <style> .box { fill:#f6f8fa; stroke:#0366d6; stroke-width:1.5; } .label { font: 14px sans-serif; fill:#111; } .small { font:12px sans-serif; fill:#333 } .dashed { stroke-dasharray:4 4; stroke:#0366d6; } </style>
  </defs>

  <!-- Top row -->
  <rect class="box" x="20" y="20" rx="8" ry="8" width="160" height="60"/>
  <text class="label" x="100" y="55" text-anchor="middle">SwiftUI App</text>

  <rect class="box" x="220" y="20" width="160" height="60" rx="8" />
  <text class="label" x="300" y="55" text-anchor="middle">LlamaBridge (ObjC++)</text>

  <rect class="box" x="420" y="20" width="220" height="60" rx="8" />
  <text class="label" x="530" y="40" text-anchor="middle">LLamaCpp.xcframework</text>
  <text class="small" x="530" y="58" text-anchor="middle">(libllama + libggml)</text>

  <rect class="box" x="660" y="10" width="180" height="40" rx="8" />
  <text class="small" x="750" y="35" text-anchor="middle">ggml backend</text>

  <rect class="box" x="660" y="80" width="180" height="40" rx="8" />
  <text class="small" x="750" y="105" text-anchor="middle">GGUF model file</text>

  <!-- Arrows -->
  <line x1="180" y1="50" x2="220" y2="50" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="50" x2="420" y2="50" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="30" x2="660" y2="30" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="100" x2="660" y2="100" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- token arrow back to UI -->
  <path d="M 750 120 C 820 120, 820 50, 100 50" fill="none" stroke="#22a" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Build subgraph -->
  <rect x="150" y="180" width="600" height="120" rx="10" fill="#fff" stroke="#999" stroke-width="1"/>
  <text class="small" x="165" y="200">Build</text>

  <rect class="box" x="200" y="210" width="200" height="60" rx="8" />
  <text class="label" x="300" y="245" text-anchor="middle">scripts/create_xcframework.sh</text>

  <rect class="box" x="450" y="210" width="200" height="60" rx="8" />
  <text class="label" x="550" y="245" text-anchor="middle">CMake / build libs</text>

  <line x1="400" y1="240" x2="450" y2="240" stroke="#222" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- shim dotted line -->
  <rect x="220" y="310" width="160" height="40" rx="8" class="box" style="stroke-dasharray:4 4; stroke:#0366d6" />
  <text class="small" x="300" y="335" text-anchor="middle">LlamaBridgeShim.c (demo)</text>
  <line x1="300" y1="80" x2="300" y2="310" stroke="#222" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arrow)"/>

  <title>iOS LLama Architecture</title>
</svg>
